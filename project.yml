name: Guitaner
options:
  bundleIdPrefix: com.guitaner
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  Guitaner:
    type: application
    platform: iOS
    sources:
      - Guitaner
    settings:
      base:
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Guitaner needs microphone access to detect the pitch of your instrument strings."
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        SWIFT_STRICT_CONCURRENCY: minimal
        GENERATE_INFOPLIST_FILE: true
        # iPhone-only, portrait. Avoids the iPad multitasking requirement to
        # support all four orientations (App Store validation).
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        # Automatic signing so the app can run on a physical device.
        # Team 324R93TVL2 = personal team "Jacek Grygiel".
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 324R93TVL2
        PRODUCT_BUNDLE_IDENTIFIER: com.guitaner.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1.0.0"
        # No networking or custom crypto → export-compliance exempt.
        # Declares it so App Store Connect stops asking on every upload.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
